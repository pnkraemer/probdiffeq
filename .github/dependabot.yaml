---
version: 2
updates:
  # Keep GitHub Actions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ['*']

  # Keep Python deps current
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ['*']
